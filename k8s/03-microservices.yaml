---
# Customer Service
apiVersion: v1
kind: Service
metadata:
  name: customer
  namespace: microservices
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: customer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-config
  namespace: microservices
data:
  SERVER_PORT: "8080"
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/customer
  SPRING_APPLICATION_JSON: '{"eureka":{"client":{"serviceUrl":{"defaultZone":"http://eureka:8761/eureka/"}}}}'
  EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
  JAVA_TOOL_OPTIONS: "-javaagent:/otel-agent/opentelemetry-javaagent.jar -XX:TieredStopAtLevel=1 -Xms64m -Xmx512m -XX:+UseContainerSupport"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://lgtm:4318"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_PROPAGATORS: "tracecontext,baggage"
  OTEL_SERVICE_NAME: "customer"
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=kubernetes"
  OTEL_LOGS_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED: "true"
  OTEL_INSTRUMENTATION_LOGBACK_MDC_ENABLED: "true"
  OTEL_INSTRUMENTATION_JDBC_ENABLED: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer
  namespace: microservices
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: customer
  template:
    metadata:
      labels:
        app: customer
    spec:
      containers:
      - name: customer
        image: victorrentea/victor:customer-1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: otel-agent
          mountPath: /otel-agent
        envFrom:
        - configMapRef:
            name: customer-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "768Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 45
          periodSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 35
          periodSeconds: 3
          failureThreshold: 10
      volumes:
      - name: otel-agent
        emptyDir: {}
      initContainers:
      - name: otel-agent-downloader
        image: curlimages/curl:8.10.1
        command: ['sh', '-c', "curl -fsSL -o /otel-agent/opentelemetry-javaagent.jar https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/download/v2.25.0/opentelemetry-javaagent.jar && echo OTel agent downloaded"]
        volumeMounts:
        - name: otel-agent
          mountPath: /otel-agent
      - name: wait-for-postgres
        image: busybox:1.35
        command: ['sh', '-c', "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
---
