---
# Customer Service
apiVersion: v1
kind: Service
metadata:
  name: customer
  namespace: microservices
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: customer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-config
  namespace: microservices
data:
  application.yaml: |
    server:
      port: 8080
    spring:
      application:
        name: customer
      datasource:
        url: jdbc:postgresql://postgres:5432/customer
        username: postgres
        password: postgres
        driver-class-name: org.postgresql.Driver
      jpa:
        hibernate:
          ddl-auto: update
        properties:
          hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect
    eureka:
      client:
        serviceUrl:
          defaultZone: http://eureka:8761/eureka/
      instance:
        prefer-ip-address: true
    management:
      endpoints:
        web:
          exposure:
            include: health,metrics,prometheus
      tracing:
        sampling:
          probability: 1.0
    logging:
      level:
        root: INFO
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer
  namespace: microservices
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: customer
  template:
    metadata:
      labels:
        app: customer
    spec:
      containers:
      - name: customer
        image: victorrentea/victor:customer-1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: config
          mountPath: /config
        - name: otel-agent
          mountPath: /otel-agent
        env:
        - name: SPRING_CONFIG_LOCATION
          value: file:/config/application.yaml
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: http://eureka:8761/eureka/
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres:5432/customer
        - name: JAVA_TOOL_OPTIONS
          value: "-javaagent:/otel-agent/opentelemetry-javaagent.jar -XX:TieredStopAtLevel=1 -Xms64m -Xmx512m -XX:+UseContainerSupport"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://lgtm:4318"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "http/protobuf"
        - name: OTEL_PROPAGATORS
          value: "tracecontext,baggage"
        - name: OTEL_SERVICE_NAME
          value: "customer"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "deployment.environment=kubernetes"
        - name: LOGGING_PATTERN_LEVEL
          value: "%5p [${spring.application.name:},%X{trace_id:-},%X{span_id:-}]"
        - name: OTEL_LOGS_EXPORTER
          value: "otlp"
        - name: OTEL_METRICS_EXPORTER
          value: "otlp"
        - name: OTEL_TRACES_EXPORTER
          value: "otlp"
        - name: OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED
          value: "true"
        - name: OTEL_INSTRUMENTATION_LOGBACK_MDC_ENABLED
          value: "true"
        - name: OTEL_INSTRUMENTATION_JDBC_ENABLED
          value: "true"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "768Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 45
          periodSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 35
          periodSeconds: 3
          failureThreshold: 10
      volumes:
      - name: config
        configMap:
          name: customer-config
      - name: otel-agent
        emptyDir: {}
      initContainers:
      - name: otel-agent-downloader
        image: curlimages/curl:8.10.1
        command: ['sh', '-c', "curl -fsSL -o /otel-agent/opentelemetry-javaagent.jar https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/download/v2.25.0/opentelemetry-javaagent.jar && echo OTel agent downloaded"]
        volumeMounts:
        - name: otel-agent
          mountPath: /otel-agent
      - name: wait-for-postgres
        image: busybox:1.35
        command: ['sh', '-c', "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
