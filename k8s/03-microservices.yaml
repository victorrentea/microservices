---
# Customer Service
apiVersion: v1
kind: Service
metadata:
  name: customer
  namespace: microservices
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: customer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-config
  namespace: microservices
data:
  application.yaml: |
    server:
      port: 8080
    spring:
      application:
        name: customer
      datasource:
        url: jdbc:postgresql://postgres:5432/customer
        username: postgres
        password: postgres
        driver-class-name: org.postgresql.Driver
      jpa:
        hibernate:
          ddl-auto: update
        properties:
          hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect
    eureka:
      client:
        serviceUrl:
          defaultZone: http://eureka:8761/eureka/
      instance:
        prefer-ip-address: true
    management:
      endpoints:
        web:
          exposure:
            include: health,metrics,prometheus
      tracing:
        sampling:
          probability: 1.0
    logging:
      level:
        root: INFO
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer
  namespace: microservices
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer
  template:
    metadata:
      labels:
        app: customer
    spec:
      containers:
      - name: customer
        image: victorrentea/victor:customer-1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: config
          mountPath: /config
        env:
        - name: SPRING_CONFIG_LOCATION
          value: file:/config/application.yaml
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: http://eureka:8761/eureka/
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres:5432/customer
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: customer-config
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.35
        command: ['sh', '-c', "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
