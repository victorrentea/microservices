          ddl-auto: update
        properties:
          hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect
      rabbitmq:
        host: rabbitmq
        port: 5672
        username: guest
        password: guest
      cloud:
        function:
          definition: onPaymentResultEvent;onShippingResultEvent
        stream:
          bindings:
            onPaymentResultEvent-in-0:
              destination: PaymentResultEvent-out
            onShippingResultEvent-in-0:
              destination: ShippingResultEvent-out
    eureka:
      client:
        serviceUrl:
          defaultZone: http://eureka:8761/eureka/
      instance:
        prefer-ip-address: true
    management:
      endpoints:
        web:
          exposure:
            include: health,metrics,prometheus
      tracing:
        sampling:
          probability: 1.0
---
