# Order Service
apiVersion: v1
kind: Service
metadata:
  name: order
  namespace: microservices
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: order
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-config
  namespace: microservices
data:
  application.yaml: | #GRESIT complet!
    server:
      port: 8080
    spring:
      application:
        name: order
      datasource:
        url: jdbc:postgresql://postgres:5432/order_db
        username: postgres
        password: postgres
        driver-class-name: org.postgresql.Driver
      jpa:
