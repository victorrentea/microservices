---
# Eureka Service Registry
apiVersion: v1
kind: Service
metadata:
  name: eureka
  namespace: microservices
spec:
  type: ClusterIP
  ports:
  - port: 8761
    targetPort: 8761
  selector:
    app: eureka
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: eureka-config
  namespace: microservices
data:
  EUREKA_INSTANCE_HOSTNAME: "eureka"
  EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
  SPRING_APPLICATION_JSON: '{"eureka":{"client":{"serviceUrl":{"defaultZone":"http://eureka:8761/eureka/"}}}}'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka
  template:
    metadata:
      labels:
        app: eureka
    spec:
      containers:
      - name: eureka
        image: victorrentea/victor:eureka-1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8761
        envFrom:
        - configMapRef:
            name: eureka-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8761
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8761
          initialDelaySeconds: 20
          periodSeconds: 5
---
# API Gateway
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: microservices
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: api-gateway
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: microservices
data:
  JAVA_TOOL_OPTIONS: "-javaagent:/otel-agent/opentelemetry-javaagent.jar -XX:TieredStopAtLevel=1 -Xms64m -Xmx512m -XX:+UseContainerSupport"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://lgtm:4318"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_PROPAGATORS: "tracecontext,baggage"
  OTEL_SERVICE_NAME: "api-gateway"
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=kubernetes"
  LOGGING_PATTERN_LEVEL: "%5p [${spring.application.name:},%X{trace_id:-},%X{span_id:-}]"
  OTEL_LOGS_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED: "true"
  OTEL_INSTRUMENTATION_LOGBACK_MDC_ENABLED: "true"
  OTEL_INSTRUMENTATION_JDBC_ENABLED: "true"
  EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
  SERVER_PORT: "8080"
  SPRING_APPLICATION_NAME: "api-gateway"
  SPRING_APPLICATION_JSON: '{"eureka":{"client":{"serviceUrl":{"defaultZone":"http://eureka:8761/eureka/"}}}}'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: victorrentea/victor:api-gateway-1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: otel-agent
          mountPath: /otel-agent
        envFrom:
        - configMapRef:
            name: api-gateway-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
      volumes:
      - name: otel-agent
        emptyDir: {}
      initContainers:
      - name: otel-agent-downloader
        image: curlimages/curl:8.10.1
        command: ['sh', '-c', "curl -fsSL -o /otel-agent/opentelemetry-javaagent.jar https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/download/v2.25.0/opentelemetry-javaagent.jar && echo OTel agent downloaded"]
        volumeMounts:
        - name: otel-agent
          mountPath: /otel-agent
