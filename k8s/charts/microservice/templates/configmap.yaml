apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Release.Namespace }}
data:
  SERVER_PORT: {{ .Values.port | quote }}
  SPRING_APPLICATION_JSON: {{ printf `{"eureka":{"client":{"serviceUrl":{"defaultZone":"%s"}}}}` .Values.eurekaUrl | quote }}
  EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
  JAVA_TOOL_OPTIONS: "-javaagent:/otel-agent/opentelemetry-javaagent.jar -XX:TieredStopAtLevel=1 -Xms64m -Xmx512m -XX:+UseContainerSupport"
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.otel.endpoint | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: {{ .Values.otel.protocol | quote }}
  OTEL_PROPAGATORS: "tracecontext,baggage"
  OTEL_SERVICE_NAME: {{ .Release.Name | quote }}
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=kubernetes"
  OTEL_LOGS_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED: "true"
  OTEL_INSTRUMENTATION_LOGBACK_MDC_ENABLED: "true"
  OTEL_INSTRUMENTATION_JDBC_ENABLED: "true"
  {{- if .Values.datasourceHost }}
  SPRING_DATASOURCE_URL: {{ printf "jdbc:postgresql://%s:5432/%s" .Values.datasourceHost (default .Release.Name .Values.datasourceDb) | quote }}
  {{- end }}
  {{- if .Values.rabbitmqHost }}
  SPRING_RABBITMQ_HOST: {{ .Values.rabbitmqHost | quote }}
  {{- end }}
  {{- range $client, $url := .Values.feignUrls }}
  {{ printf "SPRING_CLOUD_OPENFEIGN_CLIENT_CONFIG_%s_URL" ($client | upper | replace "-" "_") }}: {{ $url | quote }}
  {{- end }}
