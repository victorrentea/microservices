---
# Grafana LGTM — all-in-one: Grafana + Loki + Tempo + Prometheus
# Receives OTLP from microservices via OpenTelemetry Java agent (zero-code instrumentation)
#
# Ports exposed:
#   3000 → Grafana UI   (LoadBalancer → http://localhost:3000)
#   4317 → OTLP gRPC
#   4318 → OTLP HTTP    (used by OTel Java agent in all microservice pods)
apiVersion: v1
kind: Service
metadata:
  name: lgtm
  namespace: microservices
spec:
  type: ClusterIP
  ports:
  - port: 4317
    targetPort: 4317
    name: otlp-grpc
  - port: 4318
    targetPort: 4318
    name: otlp-http
  selector:
    app: lgtm
---
apiVersion: v1
kind: Service
metadata:
  name: lgtm-ui
  namespace: microservices
spec:
  type: LoadBalancer
  ports:
  - port: 3000
    targetPort: 3000
    name: grafana
  selector:
    app: lgtm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lgtm
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lgtm
  template:
    metadata:
      labels:
        app: lgtm
    spec:
      containers:
      - name: lgtm
        image: grafana/otel-lgtm:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: grafana
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
        env:
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "true"
        - name: GF_AUTH_ANONYMOUS_ORG_ROLE
          value: "Admin"
        - name: GF_AUTH_DISABLE_LOGIN_FORM
          value: "true"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 15

